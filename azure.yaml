# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# azure.yaml is an azd configuration file and isn't used by the sample application.

name: dotnet-containerapps-sqldb-redis-infra
metadata:
  template: dotnet-containerapps-sqldb-redis-infra@0.0.1-local
services:
  web:
    project: .
    language: csharp
    host: containerapp
    docker:
      path: ./Dockerfile
hooks:
  postprovision:
    posix:
      shell: sh
      run: printf '\nContainer App has the following generated settings:\n' && printf "$CONNECTION_SETTINGS" | jq -r '.[]' | sed 's/\(.*\)/\t- \1/'
      interactive: true
      continueOnError: true
    windows:
      shell: pwsh
      run: Write-Host "`n`nContainer App has the following generated settings:`n"; $CONNECTION_SETTINGS | ConvertFrom-Json | ForEach-Object { Write-Host "`t- $_" }
      interactive: true
      continueOnError: true
